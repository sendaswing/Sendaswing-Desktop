appId: com.sendaswing.desktop
productName: Sendaswing Desktop
copyright: Copyright © 2026

directories:
  output: dist
  buildResources: build

files:
  - out/**/*
  - package.json

mac:
  category: public.app-category.sports
  target:
    - target: dmg
      arch: [x64, arm64]

win:
  target:
    - target: nsis
      arch: [x64]

linux:
  target:
    - target: AppImage
      arch: [x64]

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
